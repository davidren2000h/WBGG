name: Build and publish to /docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'PRD/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Sync dist -> docs
        run: |
          rm -rf docs
          mkdir docs
          cp -r dist/. docs/
          touch docs/.nojekyll
      - name: Commit docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes"
            exit 0
          fi
          git commit -m "ci: rebuild docs [skip ci]"
          git push
